name: Publish Test-Signed NuGet

# Manually triggered workflow that publishes test-signed NuGet packages as a
# prerelease GitHub release. The git tag is the single source of truth for the
# version: the create_tag job pushes "v<major.minor.patch>-prerelease-testsigned
# -<commit>", the build jobs check out that tag, and the existing release-build
# logic (Get-XdpBuildVersionString -> Get-BuildTag) stamps every package
# straight from it. There is no separate "-testsigned" plumbing to keep in sync.

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Compute the tag without creating it, building, or releasing.'
        required: false
        default: false
        type: boolean

permissions: read-all

jobs:
  create_tag:
    name: Create Tag
    runs-on: windows-2022
    permissions:
      contents: write   # push the tag
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
    steps:
    - name: Checkout repository
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      with:
        repository: microsoft/xdp-for-windows
        fetch-depth: 0
    - name: Compute and create tag
      id: tag
      shell: PowerShell
      env:
        DRY_RUN: ${{ inputs.dry_run }}
      run: |
        Set-StrictMode -Version 'Latest'
        $ErrorActionPreference = 'Stop'
        . ./tools/common.ps1

        # Assemble the tag from the product version (src/xdp.props) and the short
        # commit hash. This is the only place the "-testsigned" marker is chosen;
        # the build reads it back off the tag via Get-BuildTag.
        $Version = Get-XdpBuildVersion
        $Base = "$($Version.Major).$($Version.Minor).$($Version.Patch)"
        $Commit = git describe --long --always --exclude=* --abbrev=8
        $Tag = "v$Base-prerelease-testsigned-$Commit"
        Write-Host "Computed tag: $Tag"
        Add-Content -Encoding UTF8 -Path $env:GITHUB_OUTPUT -Value "tag=$Tag"

        if ($env:DRY_RUN -eq 'true') {
            Write-Host "Dry run - not creating the tag."
            return
        }

        git check-ref-format "refs/tags/$Tag"
        if ($LASTEXITCODE -ne 0) { throw "Invalid tag name: $Tag" }

        $Existing = git ls-remote --tags origin "refs/tags/$Tag"
        if (-not [string]::IsNullOrWhiteSpace($Existing)) { throw "Tag already exists: $Tag" }

        git config user.name "github-actions[bot]"
        git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git tag -a -m "Test-signed prerelease $Tag" -- $Tag HEAD
        git push origin "refs/tags/$Tag"

  build:
    name: Build
    if: ${{ !inputs.dry_run }}
    needs: create_tag
    strategy:
      fail-fast: false
      matrix:
        config: [Release]
        platform: [x64, arm64]
    permissions:
      actions: read
      contents: read
    uses: ./.github/workflows/build.yml
    with:
      ref: ${{ needs.create_tag.outputs.tag }}
      config: ${{ matrix.config }}
      os: '2022'
      platform: ${{ matrix.platform }}
      artifact_path: bin_${{ matrix.config }}_${{ matrix.platform }}

  build_allpackage:
    name: Build AllPackage
    if: ${{ !inputs.dry_run }}
    needs: [create_tag, build]
    permissions:
      actions: read
      contents: read
    runs-on: windows-2022
    steps:
    - name: Checkout repository
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      with:
        repository: microsoft/xdp-for-windows
        ref: ${{ needs.create_tag.outputs.tag }}
        submodules: recursive
    - name: Download build artifacts
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
      with:
        pattern: bin_Release_*
        path: artifacts/bin
        merge-multiple: true
    - name: Setup MSBuild.exe
      uses: microsoft/setup-msbuild@30375c66a4eea26614e0d39710365f22f8b0af57
    - name: Nuget Restore
      run: msbuild.exe xdp.sln /t:restore /p:RestoreConfigFile=tools/nuget.config /p:Configuration=Release /p:Platform=x64
    - name: Build AllPackage
      run: msbuild xdp.sln /m /nodeReuse:false /t:onebranch /p:Configuration=Release /p:Platform=x64 /p:IsAdmin=true /p:BuildStage=AllPackage /p:NugetPlatforms=x64%2carm64
    - name: Upload Artifacts
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
      with:
        name: bin_allpackage_Release
        path: |
          artifacts/bin/Release
          !artifacts/bin/**/*.ilk
          !artifacts/bin/**/*.exp
          !artifacts/bin/**/*.lastcodeanalysissucceeded

  publish:
    name: Publish Prerelease
    if: ${{ !inputs.dry_run }}
    needs: [create_tag, build, build_allpackage]
    runs-on: windows-2022
    permissions:
      contents: write
      actions: read
    steps:
    - name: Checkout repository
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      with:
        repository: microsoft/xdp-for-windows
        ref: ${{ needs.create_tag.outputs.tag }}
    - name: Download build artifacts
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
      with:
        pattern: bin_*Release*
        path: artifacts
    - name: Collect and validate NuGet packages
      shell: PowerShell
      env:
        TAG: ${{ needs.create_tag.outputs.tag }}
      run: |
        Set-StrictMode -Version 'Latest'
        $ErrorActionPreference = 'Stop'

        New-Item -ItemType Directory -Path release_assets -Force | Out-Null
        Get-ChildItem -Path artifacts -Filter *.nupkg -Recurse | Copy-Item -Destination release_assets

        $Packages = Get-ChildItem -Path release_assets -Filter *.nupkg
        Write-Host "NuGet packages found:"
        $Packages | ForEach-Object { Write-Host "  $($_.Name)" }

        # Every package must carry the tag's version (sans leading 'v'), since
        # both derive from the same tag via Get-XdpBuildVersionString.
        $ExpectedVersion = $env:TAG -replace '^v', ''

        $VersionPattern = '^(?<id>.+?)\.(?<version>\d+\.\d+\.\d+(?:-[0-9A-Za-z.-]+)?)\.nupkg$'
        $Parsed = foreach ($Package in $Packages) {
            if ($Package.Name -notmatch $VersionPattern) {
                Write-Error "Unable to parse version from package name: $($Package.Name)"
            }
            [pscustomobject]@{ Id = $Matches.id; Version = $Matches.version }
        }

        $Mismatched = @($Parsed | Where-Object { $_.Version -ne $ExpectedVersion })
        if ($Mismatched.Count -gt 0) {
            $Details = ($Mismatched | ForEach-Object { "$($_.Id) ($($_.Version))" }) -join ', '
            Write-Error "Packages do not match tag version '$ExpectedVersion': $Details"
        }

        # Validate the expected set of packages is present (compared by id).
        $ExpectedIds = @(
            "Microsoft.XDP-for-Windows.Runtime.x64",
            "Microsoft.XDP-for-Windows.Runtime.arm64",
            "Microsoft.XDP-for-Windows.Sdk"
        )
        $ActualIds = @($Parsed | ForEach-Object { $_.Id })
        foreach ($Expected in $ExpectedIds) {
            if ($Expected -notin $ActualIds) {
                Write-Error "Missing expected package: $Expected.$ExpectedVersion.nupkg"
            }
        }
        Write-Host "All $($ExpectedIds.Count) expected packages found with version $ExpectedVersion."
    - name: Create prerelease
      shell: PowerShell
      env:
        GH_TOKEN: ${{ github.token }}
        TAG: ${{ needs.create_tag.outputs.tag }}
      run: |
        Set-StrictMode -Version 'Latest'
        $ErrorActionPreference = 'Stop'

        Write-Host "Creating prerelease for tag: $env:TAG"

        $Packages = (Get-ChildItem -Path release_assets -Filter *.nupkg).FullName
        gh release create $env:TAG `
          --repo $env:GITHUB_REPOSITORY `
          --title $env:TAG `
          --notes "Auto-generated prerelease containing test-signed NuGet packages built from tag ``$env:TAG`` at commit ``${{ github.sha }}``." `
          --prerelease `
          --verify-tag `
          @Packages
