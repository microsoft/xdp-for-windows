name: Publish Test-Signed NuGet

# Manually triggered workflow that builds test-signed NuGet packages and
# uploads them to a new draft prerelease GitHub release.

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Build and collect packages without creating a release.'
        required: false
        default: false
        type: boolean

permissions: read-all

jobs:
  build:
    name: Build
    strategy:
      fail-fast: false
      matrix:
        config: [Release]
        platform: [x64, arm64]
    permissions:
      actions: read
      contents: read
    uses: ./.github/workflows/build.yml
    with:
      config: ${{ matrix.config }}
      os: '2022'
      platform: ${{ matrix.platform }}
      artifact_path: bin_${{ matrix.config }}_${{ matrix.platform }}

  build_allpackage:
    name: Build AllPackage
    needs: build
    permissions:
      actions: read
      contents: read
    runs-on: windows-2022
    steps:
    - name: Checkout repository
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      with:
        repository: microsoft/xdp-for-windows
        submodules: recursive
    - name: Download x64 Artifacts
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
      with:
        name: bin_Release_x64
        path: artifacts/bin
    - name: Download arm64 Artifacts
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
      with:
        name: bin_Release_arm64
        path: artifacts/bin
    - name: Setup MSBuild.exe
      uses: microsoft/setup-msbuild@30375c66a4eea26614e0d39710365f22f8b0af57
    - name: Nuget Restore
      run: msbuild.exe xdp.sln /t:restore /p:RestoreConfigFile=tools/nuget.config /p:Configuration=Release /p:Platform=x64
    - name: Build AllPackage
      run: msbuild xdp.sln /m /nodeReuse:false /t:onebranch /p:Configuration=Release /p:Platform=x64 /p:IsAdmin=true /p:BuildStage=AllPackage /p:NugetPlatforms=x64%2carm64
    - name: Upload Artifacts
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
      with:
        name: bin_allpackage_Release
        path: |
          artifacts/bin/Release
          !artifacts/bin/**/*.ilk
          !artifacts/bin/**/*.exp
          !artifacts/bin/**/*.lastcodeanalysissucceeded

  publish:
    name: Publish Draft Prerelease
    needs: [build, build_allpackage]
    runs-on: windows-2022
    permissions:
      contents: write
      actions: read
    steps:
    - name: Checkout repository
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      with:
        repository: microsoft/xdp-for-windows
    - name: Download build artifacts
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
      with:
        pattern: bin_*Release*
        path: artifacts
    - name: Collect and validate NuGet packages
      id: collect
      shell: PowerShell
      run: |
        Set-StrictMode -Version 'Latest'
        $ErrorActionPreference = 'Stop'

        $RootDir = $env:GITHUB_WORKSPACE
        . $RootDir\tools\common.ps1
        $VersionString = Get-XdpBuildVersionString
        Write-Host "NuGet version string: $VersionString"

        New-Item -ItemType Directory -Path release_assets -Force | Out-Null
        Get-ChildItem -Path artifacts -Filter *.nupkg -Recurse | Copy-Item -Destination release_assets

        $Packages = Get-ChildItem -Path release_assets -Filter *.nupkg
        Write-Host "NuGet packages found:"
        $Packages | ForEach-Object { Write-Host "  $($_.Name)" }

        # Validate expected packages are present with matching versions.
        $ExpectedPackages = @(
            "Microsoft.XDP-for-Windows.Runtime.x64.$VersionString.nupkg",
            "Microsoft.XDP-for-Windows.Runtime.arm64.$VersionString.nupkg",
            "Microsoft.XDP-for-Windows.Sdk.$VersionString.nupkg"
        )
        $PackageNames = $Packages | ForEach-Object { $_.Name }
        foreach ($Expected in $ExpectedPackages) {
            if ($Expected -notin $PackageNames) {
                Write-Error "Missing expected package: $Expected"
            }
        }
        Write-Host "All $($ExpectedPackages.Count) expected packages found with version $VersionString."

        Add-Content -Encoding UTF8 -Path $env:GITHUB_OUTPUT -Value "version_string=$VersionString"
    - name: Create draft prerelease
      if: ${{ !inputs.dry_run }}
      shell: PowerShell
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        Set-StrictMode -Version 'Latest'
        $ErrorActionPreference = 'Stop'

        $Tag = "v${{ steps.collect.outputs.version_string }}"
        Write-Host "Creating draft prerelease with tag: $Tag"

        $Packages = (Get-ChildItem -Path release_assets -Filter *.nupkg).FullName
        gh release create $Tag `
          --repo $env:GITHUB_REPOSITORY `
          --title $Tag `
          --notes "Auto-generated draft prerelease containing test-signed NuGet packages built from ``${{ github.ref_name }}`` at commit ``${{ github.sha }}``." `
          --draft `
          --prerelease `
          --target ${{ github.sha }} `
          @Packages
    - name: Dry run summary
      if: ${{ inputs.dry_run }}
      shell: PowerShell
      run: |
        $Tag = "v${{ steps.collect.outputs.version_string }}"
        Write-Host "Dry run - skipping release creation. Would have created: $Tag"
        Write-Host "Packages that would be uploaded:"
        Get-ChildItem release_assets -Filter *.nupkg | ForEach-Object { Write-Host "  $($_.Name)" }
